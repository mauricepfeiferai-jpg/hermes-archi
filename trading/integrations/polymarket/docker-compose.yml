version: "3.9"

services:
  qpts-agent:
    build: .
    container_name: qpts-harvey
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./backtests:/app/backtests
    restart: unless-stopped
    environment:
      - PAPER_MODE=${PAPER_MODE:-true}
      - CYCLE_INTERVAL_MINUTES=${CYCLE_INTERVAL_MINUTES:-15}
    networks:
      - qpts-net

  prometheus:
    image: prom/prometheus:latest
    container_name: qpts-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - qpts-net
    profiles:
      - monitoring

networks:
  qpts-net:
    driver: bridge
